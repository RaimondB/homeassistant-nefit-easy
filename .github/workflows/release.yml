# HA-idiomatic release: conventional commits -> release-please opens/maintains
# a release PR; merging it tags a GitHub Release and bumps the versions in
# manifest.json and pyproject.toml. (semantic-release is npm-specific and is
# deliberately NOT used here.)

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
